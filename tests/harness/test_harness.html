<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lovefield Tests</title>
    <link rel="stylesheet" href="../../node_modules/mocha/mocha.css" />
  </head>
  <body>
    <div id="mocha"></div>
    <script src="../../node_modules/mocha/mocha.js"></script>
    <script>
      mocha.setup('bdd');
      // Global mocha results collector
      window.mochaResults = {
        finished: false,
        failures: 0,
        passes: 0,
        tests: [],
      };
    </script>
    <!-- The test bundle will be inserted here -->
    <script src="test_bundle.js"></script>
    <script>
      const runner = mocha.run();
      runner.on('test end', (test) => {
        const testResult = {
          title: test.fullTitle(),
          state: test.state,
        };
        if (test.state === 'failed') {
          testResult.err = {
            message: test.err.message,
            stack: test.err.stack,
          };
        }
        window.mochaResults.tests.push(testResult);
      });
      runner.on('end', () => {
        window.mochaResults.finished = true;
        window.mochaResults.failures = runner.failures;
        window.mochaResults.passes = runner.total - runner.failures;
      });
    </script>
  </body>
</html>
